<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guardian 起夜流程调试台</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260715-3" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Guardian 起夜流程调试台</h1>
          <p>模拟硬件信号、文字对话、状态机与超时流程</p>
        </div>
        <div class="header-actions">
          <label>老人
            <select id="elderSelect">
              <option value="E001">E001 王秀兰</option>
              <option value="E002">E002 李建国</option>
              <option value="E003">E003 周美华</option>
            </select>
          </label>
          <button class="button secondary" data-action="reset">重置调试数据</button>
        </div>
      </header>

      <section class="flow-strip" id="flowSteps" aria-label="起夜流程">
        <div class="flow-step" data-flow-state="signal"><strong>1</strong><span>硬件触发</span></div>
        <div class="flow-step" data-flow-state="ask"><strong>2</strong><span>等待回答</span></div>
        <div class="flow-step" data-flow-state="understand"><strong>3</strong><span>理解意图</span></div>
        <div class="flow-step" data-flow-state="monitor"><strong>4</strong><span>返床监听</span></div>
        <div class="flow-step" data-flow-state="result"><strong>5</strong><span>关闭或升级</span></div>
      </section>

      <section class="control-grid">
        <article class="panel">
          <div class="panel-heading"><h2>1. 模拟硬件</h2><span>GuardianMessage 1.0</span></div>
          <div class="two-fields">
            <label>离床秒数<input id="noBodySeconds" type="number" min="1" value="180" /></label>
            <label>位置<select id="signalLocation"><option value="bedroom">卧室</option><option value="bathroom">卫生间</option><option value="living_room">客厅</option></select></label>
          </div>
          <div class="button-grid">
            <button class="button warning" data-signal="leave-bed">睡眠带：离床</button>
            <button class="button danger" data-signal="fall">雷达：疑似跌倒</button>
            <button class="button success" data-signal="return-to-bed">睡眠带：已返床</button>
            <button class="button secondary" data-signal="presence">雷达：检测到活动</button>
          </div>
          <details class="json-box"><summary>查看最近一次硬件消息</summary><pre id="lastSignalPayload">尚未发送信号</pre></details>
        </article>

        <article class="panel">
          <div class="panel-heading"><h2>2. 老人文字回答</h2><span id="agentModeLabel">正在读取处理模式</span></div>
          <label>输入老人原话<textarea id="nightTurnText" rows="4" placeholder="例如：我去趟卫生间，不用担心">我去趟卫生间，不用担心</textarea></label>
          <div class="quick-replies">
            <button data-utterance="我去趟卫生间，不用担心">去卫生间</button>
            <button data-utterance="我起来喝口水">喝水</button>
            <button data-utterance="我没事，就是有点头晕">头晕</button>
            <button data-utterance="我也说不清楚">不明确</button>
            <button data-utterance="我摔倒了，起不来">跌倒</button>
          </div>
          <button id="nightTurnButton" class="button primary wide" data-action="night-turn">提交文字</button>
          <p id="agentInputNote" class="muted">正在读取 Agent 接入状态。</p>
        </article>

        <article class="panel timer-panel">
          <div class="panel-heading"><h2>3. 超时控制</h2><span>服务端计时</span></div>
          <div id="timerClock" class="timer-clock"><strong>--</strong><span>未启动</span></div>
          <label>等待超时（秒）<input id="timerSeconds" type="number" min="1" max="3600" step="1" value="15" placeholder="15" inputmode="numeric" /></label>
          <label class="check-row"><input id="autoTimer" type="checkbox" checked /><span>状态变化后自动计时</span></label>
          <div class="timer-buttons">
            <button class="button primary" data-timer="start">启动/重启</button>
            <button class="button secondary" data-timer="cancel">取消</button>
            <button class="button danger" data-timer="fire">立即超时</button>
          </div>
          <p id="timerNote" class="muted">触发离床后开始等待老人回答。</p>
        </article>
      </section>

      <section class="result-grid">
        <article class="panel current-panel">
          <div class="panel-heading"><h2>当前状态</h2><span id="currentEventId">尚未开始测试</span></div>
          <div id="eventDetail" class="event-detail"><p class="empty">点击“睡眠带：离床”开始一次新测试。</p></div>
          <div id="voiceAlert"></div>
          <div id="activeEventMarker"></div>
        </article>

        <article class="panel conversation-panel">
          <div class="panel-heading"><h2>Agent 判断</h2><span id="agentResultLabel">标准化输出</span></div>
          <div id="conversationTurns" class="scroll-area"><p class="empty">等待老人回答进入 Agent。</p></div>
        </article>

        <article class="panel timeline-panel">
          <div class="panel-heading"><h2>状态机时间线</h2><span>本次测试</span></div>
          <div id="timeline" class="scroll-area"><p class="empty">尚无状态变化。</p></div>
        </article>
      </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="/static/app.js?v=20260715-4"></script>
  </body>
</html>
